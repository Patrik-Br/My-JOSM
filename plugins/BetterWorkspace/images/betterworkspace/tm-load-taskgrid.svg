<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- task grid: 2x2 squares, one filled = a mapped task -->
  <rect x="2" y="2" width="14" height="14" rx="1.2" fill="none" stroke="#1f6fb2" stroke-width="1.6"/>
  <line x1="9" y1="2" x2="9" y2="16" stroke="#1f6fb2" stroke-width="1.4"/>
  <line x1="2" y1="9" x2="16" y2="9" stroke="#1f6fb2" stroke-width="1.4"/>
  <rect x="2.8" y="9.8" width="5.4" height="5.4" fill="#e07b26" fill-opacity="0.45"/>
  <!-- download-arrow badge, bottom-right -->
  <circle cx="18.2" cy="18.2" r="5.3" fill="#ffffff" stroke="#e07b26" stroke-width="1.4"/>
  <path d="M 18.2 15.5 v 5.2 M 16.0 18.6 L 18.2 20.8 L 20.4 18.6"
        fill="none" stroke="#e07b26" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
